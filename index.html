<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexo Tecnologia - Painel Admin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --nexo-dark: #0f0e13;
            --nexo-card: #1c1b22;
            --nexo-neon: #9333ea;
        }

        body {
            background-color: var(--nexo-dark);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .neon-glow {
            box-shadow: 0 0 40px 10px rgba(147, 51, 234, 0.4), inset 0 0 10px rgba(147, 51, 234, 0.2);
            border-radius: 28px;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 30px 5px rgba(147, 51, 234, 0.4); }
            100% { box-shadow: 0 0 60px 20px rgba(147, 51, 234, 0.8); }
        }

        .fade-out { animation: fadeOut 0.6s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; transform: scale(1.1); } }
        
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .input-dark {
            background-color: #2a2931;
            border: 1px solid #3f3e46;
            color: white;
            transition: all 0.3s ease;
        }
        .input-dark:focus {
            border-color: var(--nexo-neon);
            box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.3);
            outline: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <!-- TELA DE LOGIN DO ADMIN (SaaS) -->
    <div id="admin-login" class="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-[#0f0e13] px-5">
        <div class="bg-[#1c1b22] p-8 rounded-3xl border border-[#2a2931] shadow-[0_0_40px_rgba(147,51,234,0.15)] w-full max-w-sm transform transition-all">
            <div class="flex justify-center mb-6">
                <div class="neon-glow bg-[#15151b] w-20 h-20 flex items-center justify-center border-2 border-purple-500 rounded-2xl">
                    <span class="text-purple-500 font-black text-4xl">N</span>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-white text-center mb-1 tracking-wide">Nexo Admin</h2>
            <p class="text-purple-400 text-[10px] font-bold text-center mb-8 uppercase tracking-widest">Acesso Restrito</p>
            
            <form onsubmit="loginAdmin(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 ml-1">Usuário</label>
                    <input type="text" id="admin-user" required placeholder="ID do Administrador" class="input-dark w-full p-3.5 rounded-xl text-sm font-medium">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 ml-1">Senha de Segurança</label>
                    <input type="password" id="admin-pass" required placeholder="••••••••" class="input-dark w-full p-3.5 rounded-xl text-sm font-medium">
                </div>
                <button type="submit" id="btn-login-admin" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3.5 rounded-xl mt-6 transition-all shadow-[0_0_15px_rgba(147,51,234,0.4)] active:scale-95 flex justify-center">
                    Entrar no Painel
                </button>
            </form>
        </div>
    </div>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="absolute inset-0 z-50 hidden flex-col items-center justify-center bg-[#0f0e13]">
        <div class="neon-glow bg-[#15151b] w-32 h-32 flex items-center justify-center border-[4px] border-white transition-transform transform hover:scale-105">
            <svg viewBox="0 0 100 100" class="w-full h-full">
                <text x="50" y="68" font-family="sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle">N</text>
            </svg>
        </div>
        <p class="mt-12 text-purple-400 font-bold tracking-widest text-sm uppercase animate-pulse">Iniciando Servidores...</p>
    </div>

    <!-- APLICATIVO PRINCIPAL -->
    <div id="main-app" class="hidden h-full flex-col">
        <header class="bg-[#1c1b22] px-6 py-4 flex items-center justify-between border-b border-[#2a2931] shadow-md sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#15151b] rounded-lg border-2 border-purple-500 flex items-center justify-center" style="box-shadow: 0 0 10px rgba(147, 51, 234, 0.5);">
                    <span class="text-purple-500 font-black text-xl">N</span>
                </div>
                <h1 class="text-xl font-bold tracking-wide text-white">NEXO<span class="text-purple-500 font-light">SaaS</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-purple-900/40 border border-purple-500/50 text-purple-300 text-xs px-3 py-1.5 rounded-full flex items-center gap-2 font-semibold">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Online
                </div>
                <!-- BOTÃO SAIR ADICIONADO -->
                <button onclick="logoutAdmin()" class="bg-red-500/10 border border-red-500/30 text-red-500 hover:bg-red-500 hover:text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all active:scale-95 flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Sair
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24 slide-up">
            <h2 class="text-sm text-gray-400 uppercase tracking-widest mb-4 mt-2 px-2 font-semibold">Empresas Gerenciadas (Tenants)</h2>
            <div id="lista-empresas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="bg-[#1c1b22] p-5 rounded-2xl border border-[#2a2931] animate-pulse h-28"></div>
            </div>
        </main>

        <button onclick="abrirModalCadastro()" class="fixed bottom-6 right-6 bg-purple-600 hover:bg-purple-500 w-16 h-16 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(147,51,234,0.6)] z-40 transition-transform active:scale-95 border-2 border-purple-400/30">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </button>
    </div>

    <!-- MODAL 1: CADASTRAR CLIENTE -->
    <div id="modal-cliente" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex-col justify-end md:justify-center items-center opacity-0 transition-opacity duration-300">
        <div class="bg-[#1c1b22] w-full md:w-96 rounded-t-3xl md:rounded-3xl p-6 border border-[#2a2931] transform translate-y-full transition-transform duration-300 shadow-2xl" id="modal-content-cadastro">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">Novo Cliente</h3>
                <button onclick="fecharModalCadastro()" class="text-gray-400 hover:text-white bg-[#2a2931] p-2 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="form-novo-cliente" class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1 ml-1">Nome da Empresa</label>
                    <input type="text" id="nome-empresa" required placeholder="Ex: Bel Excursões" class="input-dark w-full p-3 rounded-xl">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1 ml-1">E-mail de Login</label>
                    <input type="email" id="email-cliente" required placeholder="contato@empresa.com" class="input-dark w-full p-3 rounded-xl">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase tracking-wide mb-1 ml-1">Senha Provisória (Mín. 6)</label>
                    <input type="text" id="senha-cliente" required minlength="6" placeholder="Senha do cliente" class="input-dark w-full p-3 rounded-xl">
                </div>
                <button type="submit" id="btn-cadastrar" class="w-full bg-gradient-to-r from-purple-600 to-purple-800 text-white font-bold py-4 px-4 rounded-xl mt-4 shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                    Gerar Sistema
                </button>
            </form>
        </div>
    </div>

    <!-- MODAL 2: GERENCIAR CLIENTE EXISTENTE -->
    <div id="modal-gerenciar" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex-col justify-end md:justify-center items-center opacity-0 transition-opacity duration-300">
        <div class="bg-[#1c1b22] w-full md:w-96 rounded-t-3xl md:rounded-3xl p-6 border border-[#2a2931] transform translate-y-full transition-transform duration-300 shadow-2xl" id="modal-content-gerenciar">
            <div class="flex justify-between items-center mb-6 border-b border-[#2a2931] pb-4">
                <div>
                    <h3 class="text-xl font-bold text-white" id="manage-nome">Nome da Empresa</h3>
                    <p class="text-xs text-gray-500 font-mono mt-1" id="manage-id">ID: 12345</p>
                </div>
                <button onclick="fecharModalGerenciar()" class="text-gray-400 hover:text-white bg-[#2a2931] p-2 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-4">
                <div class="bg-[#2a2931] p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="text-sm font-semibold text-white">Acesso ao Sistema</p>
                        <p class="text-xs text-gray-400">Bloqueia o login do cliente</p>
                    </div>
                    <button id="btn-status" onclick="toggleStatus()" class="px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-md"></button>
                </div>
                <div class="bg-[#2a2931] p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="text-sm font-semibold text-white">Mensalidade</p>
                        <p class="text-xs text-gray-400">Controle financeiro</p>
                    </div>
                    <button id="btn-pagamento" onclick="togglePagamento()" class="px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-md"></button>
                </div>
                <button onclick="confirmarExclusao()" class="w-full mt-6 bg-red-500/10 border border-red-500/30 text-red-500 hover:bg-red-500 hover:text-white font-bold py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Excluir Cliente Definitivamente
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, doc, getDocs, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxyVFfsSBS1dNtBfiJoNHqkE5LyxUTRFI",
            authDomain: "nexo-crm-5325f.firebaseapp.com",
            projectId: "nexo-crm-5325f",
            storageBucket: "nexo-crm-5325f.firebasestorage.app",
            messagingSenderId: "145983577119",
            appId: "1:145983577119:web:003e53b89437cfb1b4092a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appSecundario = initializeApp(firebaseConfig, "AppCriador");
        const authSecundario = getAuth(appSecundario);

        let clienteSelecionado = null;

        // SISTEMA DE LOGIN DO ADMIN
        window.loginAdmin = function(e) {
            e.preventDefault();
            const u = document.getElementById('admin-user').value;
            const p = document.getElementById('admin-pass').value;
            const btn = document.getElementById('btn-login-admin');

            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            setTimeout(() => {
                if (u === 'LeonhardToledo' && p === '1315L30h!') {
                    document.getElementById('admin-login').classList.add('fade-out');
                    setTimeout(() => {
                        document.getElementById('admin-login').style.display = 'none';
                        iniciarApp();
                    }, 600);
                } else {
                    btn.innerHTML = 'Credenciais Inválidas!';
                    btn.classList.replace('bg-purple-600', 'bg-red-600');
                    btn.classList.replace('hover:bg-purple-500', 'hover:bg-red-500');
                    setTimeout(() => {
                        btn.innerHTML = 'Entrar no Painel';
                        btn.classList.replace('bg-red-600', 'bg-purple-600');
                        btn.classList.replace('hover:bg-red-500', 'hover:bg-purple-500');
                    }, 2000);
                }
            }, 800);
        }

        // SISTEMA DE LOGOUT DO ADMIN (NOVO)
        window.logoutAdmin = function() {
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('main-app').classList.remove('flex');
            const loginScreen = document.getElementById('admin-login');
            loginScreen.style.display = 'flex';
            loginScreen.classList.remove('fade-out');
            document.getElementById('admin-user').value = '';
            document.getElementById('admin-pass').value = '';
        }

        window.tocarSomFuturista = function() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }

        window.iniciarApp = function() {
            tocarSomFuturista();
            const splash = document.getElementById('splash-screen');
            const mainApp = document.getElementById('main-app');
            
            splash.classList.remove('hidden');
            splash.classList.add('flex');
            
            setTimeout(() => {
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.style.display = 'none';
                    mainApp.classList.remove('hidden');
                    mainApp.classList.add('flex');
                    carregarEmpresas();
                }, 600);
            }, 1000);
        }

        // --- CONTROLE DOS MODAIS ---
        window.abrirModalCadastro = function() {
            const m = document.getElementById('modal-cliente');
            const c = document.getElementById('modal-content-cadastro');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('translate-y-full'); }, 10);
        }

        window.fecharModalCadastro = function() {
            const m = document.getElementById('modal-cliente');
            const c = document.getElementById('modal-content-cadastro');
            m.classList.add('opacity-0'); c.classList.add('translate-y-full');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
        }

        window.abrirModalGerenciar = function(id, nome, status, pagamento) {
            clienteSelecionado = { id, nome, status, pagamento };
            document.getElementById('manage-nome').innerText = nome;
            document.getElementById('manage-id').innerText = `ID: ${id}`;
            atualizarBotoesGerenciamento();

            const m = document.getElementById('modal-gerenciar');
            const c = document.getElementById('modal-content-gerenciar');
            m.classList.remove('hidden'); m.classList.add('flex');
            setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('translate-y-full'); }, 10);
        }

        window.fecharModalGerenciar = function() {
            const m = document.getElementById('modal-gerenciar');
            const c = document.getElementById('modal-content-gerenciar');
            m.classList.add('opacity-0'); c.classList.add('translate-y-full');
            setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); clienteSelecionado = null; }, 300);
        }

        function atualizarBotoesGerenciamento() {
            const btnStatus = document.getElementById('btn-status');
            const btnPagamento = document.getElementById('btn-pagamento');

            if(clienteSelecionado.status === 'Ativo') {
                btnStatus.innerText = "Desativar";
                btnStatus.className = "px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-md bg-green-500/20 text-green-400 border border-green-500/50";
            } else {
                btnStatus.innerText = "Ativar";
                btnStatus.className = "px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-md bg-red-500/20 text-red-400 border border-red-500/50";
            }

            if(clienteSelecionado.pagamento === 'Em dia') {
                btnPagamento.innerText = "Em dia";
                btnPagamento.className = "px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-md bg-blue-500/20 text-blue-400 border border-blue-500/50";
            } else {
                btnPagamento.innerText = "Pendente";
                btnPagamento.className = "px-4 py-2 rounded-lg text-sm font-bold transition-colors shadow-md bg-orange-500/20 text-orange-400 border border-orange-500/50";
            }
        }

        window.toggleStatus = async function() {
            const novoStatus = clienteSelecionado.status === 'Ativo' ? 'Inativo' : 'Ativo';
            try {
                const docRef = doc(db, "empresas", clienteSelecionado.id);
                await updateDoc(docRef, { status: novoStatus });
                clienteSelecionado.status = novoStatus;
                atualizarBotoesGerenciamento();
                carregarEmpresas();
            } catch(e) { alert("Erro ao mudar status: " + e.message); }
        }

        window.togglePagamento = async function() {
            const novoPgto = clienteSelecionado.pagamento === 'Em dia' ? 'Pendente' : 'Em dia';
            try {
                const docRef = doc(db, "empresas", clienteSelecionado.id);
                await updateDoc(docRef, { pagamento: novoPgto });
                clienteSelecionado.pagamento = novoPgto;
                atualizarBotoesGerenciamento();
                carregarEmpresas();
            } catch(e) { alert("Erro ao mudar pagamento: " + e.message); }
        }

        window.confirmarExclusao = async function() {
            const certeza = confirm(`TEM CERTEZA ABSOLUTA?\nIsso apagará a empresa "${clienteSelecionado.nome}" do banco de dados.`);
            if(!certeza) return;

            try {
                await deleteDoc(doc(db, "empresas", clienteSelecionado.id));
                alert(`Empresa excluída com sucesso!`);
                fecharModalGerenciar();
                carregarEmpresas();
            } catch(e) {
                alert("Erro ao excluir: " + e.message);
            }
        }

        document.getElementById('form-novo-cliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-cadastrar');
            const nome = document.getElementById('nome-empresa').value;
            const email = document.getElementById('email-cliente').value;
            const senha = document.getElementById('senha-cliente').value;

            btn.innerHTML = `Criando...`;
            
            try {
                const credencial = await createUserWithEmailAndPassword(authSecundario, email, senha);
                const uid = credencial.user.uid;

                const docRef = await addDoc(collection(db, "empresas"), {
                    nomeFantasia: nome,
                    status: "Ativo",
                    pagamento: "Em dia",
                    dataCriacao: serverTimestamp()
                });

                await setDoc(doc(db, "usuarios", uid), {
                    email: email,
                    empresaId: docRef.id,
                    perfil: "admin_cliente"
                });

                await signOut(authSecundario);
                
                btn.innerHTML = "✅ Sucesso!";
                btn.classList.replace('from-purple-600', 'from-green-500');
                btn.classList.replace('to-purple-800', 'to-green-600');
                
                setTimeout(() => {
                    fecharModalCadastro();
                    document.getElementById('form-novo-cliente').reset();
                    btn.innerHTML = `Gerar Sistema`;
                    btn.classList.replace('from-green-500', 'from-purple-600');
                    btn.classList.replace('to-green-600', 'to-purple-800');
                    carregarEmpresas();
                }, 1500);

            } catch (error) {
                alert("Erro: " + error.message);
                btn.innerHTML = "Tentar Novamente";
            }
        });

        async function carregarEmpresas() {
            const container = document.getElementById('lista-empresas');
            try {
                const querySnapshot = await getDocs(collection(db, "empresas"));
                container.innerHTML = "";

                if(querySnapshot.empty) {
                    container.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center p-10 text-gray-500"><p>Nenhuma empresa</p></div>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const empresa = doc.data();
                    const id = doc.id;
                    const pagamentoStatus = empresa.pagamento || "Em dia"; 
                    
                    const corStatus = empresa.status === 'Ativo' ? 'green' : 'red';
                    const corPgto = pagamentoStatus === 'Em dia' ? 'blue' : 'orange';
                    const tracoLateral = empresa.status === 'Ativo' ? 'from-purple-500' : 'from-red-600';

                    container.innerHTML += `
                        <div onclick="abrirModalGerenciar('${id}', '${empresa.nomeFantasia}', '${empresa.status}', '${pagamentoStatus}')" 
                             class="bg-[#1c1b22] p-5 rounded-2xl border border-[#2a2931] flex flex-col justify-between shadow-lg relative overflow-hidden cursor-pointer hover:bg-[#25242d] transition-colors">
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b ${tracoLateral} to-transparent"></div>
                            <div class="flex justify-between items-start mb-4 pl-2">
                                <div>
                                    <h3 class="text-lg font-bold text-white leading-tight">${empresa.nomeFantasia}</h3>
                                    <p class="text-xs text-gray-500 font-mono mt-1 w-32 truncate">ID: ${id}</p>
                                </div>
                                <div class="flex flex-col gap-2 items-end">
                                    <span class="bg-${corStatus}-500/10 text-${corStatus}-400 border border-${corStatus}-500/20 py-1 px-3 rounded-full text-xs font-semibold flex items-center gap-1">
                                        <span class="w-1.5 h-1.5 rounded-full bg-${corStatus}-500"></span>
                                        ${empresa.status}
                                    </span>
                                </div>
                            </div>
                            <div class="pt-4 border-t border-[#2a2931] flex justify-between items-center pl-2">
                                <span class="bg-${corPgto}-500/10 text-${corPgto}-400 px-2 py-1 rounded text-xs border border-${corPgto}-500/20">
                                    💰 ${pagamentoStatus}
                                </span>
                                <span class="text-gray-400 text-xs flex items-center gap-1">
                                    Gerenciar <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
            }
        }
    </script>
